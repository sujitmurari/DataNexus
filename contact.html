<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTACT — SM://ANALYTICS.SYS</title>
<link rel="stylesheet" href="cyber.css">
<style>
.contact-wrap{display:grid;grid-template-columns:1fr 300px;gap:28px;padding:40px;align-items:start;}
/* form */
.ssh-head{font-family:var(--term);font-size:.95rem;color:var(--c);margin-bottom:18px;letter-spacing:.07em;line-height:1.6;}
.ssh-head .bl{opacity:0;}
.ssh-field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px;}
.ssh-lbl{font-family:var(--term);font-size:.85rem;color:var(--dim);letter-spacing:.1em;display:flex;align-items:center;gap:5px;}
.ssh-lbl::before{content:'>';color:var(--muted);}
.ssh-in{font-family:var(--term);font-size:.95rem;color:var(--g);background:rgba(0,255,65,.025);border:none;border-bottom:1px solid var(--border);padding:7px 10px;outline:none;width:100%;letter-spacing:.06em;transition:border-color .12s,background .12s;}
.ssh-in:focus{border-color:var(--g);background:var(--g-dim);}
.ssh-in::placeholder{color:var(--muted);}
textarea.ssh-in{resize:none;border:1px solid var(--border);margin-top:2px;}
textarea.ssh-in:focus{border-color:var(--g);}
.ssh-btn{width:100%;font-family:var(--term);font-size:1rem;letter-spacing:.14em;text-transform:uppercase;padding:10px;margin-top:8px;background:var(--g-dim);color:var(--g);border:1px solid rgba(0,255,65,.38);cursor:none;transition:all .12s;}
.ssh-btn:hover{background:var(--g);color:var(--bg);box-shadow:0 0 18px var(--g-glow);}
/* aside */
.contact-aside{display:flex;flex-direction:column;gap:1px;}
.aside-block{border:1px solid var(--border);background:var(--panel);padding:16px 14px;}
.aside-label{font-family:var(--term);font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.aside-label::before{content:'// ';color:var(--muted);}
.aside-link{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-family:var(--term);font-size:.88rem;color:rgba(0,255,65,.45);text-decoration:none;letter-spacing:.06em;transition:color .12s;cursor:none;}
.aside-link:hover{color:var(--c);text-shadow:0 0 6px var(--c-glow);}
.aside-link:last-child{border-bottom:none;}
.aside-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-family:var(--term);font-size:.7rem;color:var(--dim);border:1px solid var(--border);}
.avail{padding:9px 12px;background:var(--g-dim);border:1px solid rgba(0,255,65,.3);font-family:var(--term);font-size:.82rem;color:var(--g);letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.cv-btn{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--panel);border:1px solid var(--border);font-family:var(--term);font-size:.88rem;color:var(--g);text-decoration:none;transition:all .12s;cursor:none;letter-spacing:.08em;}
.cv-btn:hover{background:var(--g-dim);border-color:var(--border2);}
@media(max-width:760px){.contact-wrap{grid-template-columns:1fr;padding:20px;}}
</style>
</head>
<body>
