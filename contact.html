<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTACT — SM://ANALYTICS.SYS</title>

<link rel="stylesheet" href="cyber.css">

<style>

.contact-wrap{
display:grid;
grid-template-columns:1fr 300px;
gap:28px;
padding:40px;
align-items:start;
}

/* INPUTS */

.ssh-field{display:flex;flex-direction:column;margin-bottom:14px}

.ssh-lbl{
font-family:var(--term);
font-size:.85rem;
color:var(--dim);
letter-spacing:.1em;
}

.ssh-in{
font-family:var(--term);
font-size:.95rem;
color:var(--g);
background:rgba(0,255,65,.025);
border:none;
border-bottom:1px solid var(--border);
padding:7px 10px;
outline:none;
width:100%;
}

textarea.ssh-in{
border:1px solid var(--border);
resize:none;
}

.ssh-btn{
width:100%;
font-family:var(--term);
font-size:1rem;
letter-spacing:.14em;
padding:10px;
margin-top:8px;
background:var(--g-dim);
color:var(--g);
border:1px solid rgba(0,255,65,.38);
cursor:none;
}

/* SUCCESS MESSAGE */

.ssh-status{
margin-top:10px;
font-family:var(--term);
font-size:.85rem;
letter-spacing:.08em;
opacity:0;
transform:translateY(6px);
transition:all .35s ease;
}

.ssh-status.show{
opacity:1;
transform:translateY(0);
}

.ssh-status.success{
color:var(--g);
text-shadow:0 0 8px var(--g-glow);
}

.ssh-status.error{
color:#ff4c4c;
}

</style>
</head>

<body>

<canvas id="mx"></canvas>
<div id="cur"></div>

<div class="title-bar">
<div class="tb-dots">
<div class="tb-dot d-r"></div>
<div class="tb-dot d-a"></div>
<div class="tb-dot d-g"></div>
</div>

<div class="tb-path">
sm@analytics-sys:~$ <em>ssh hire@murari.sujit -p 22</em>
</div>
</div>

<nav class="menu-bar">
<a class="mb-logo" href="index.html">SM<span>://</span>SYS</a>

<ul class="mb-nav">

<li><a href="connect.html">CONNECT</a></li>
<li><a href="contact.html" class="act">CONTACT</a></li>
</ul>
</nav>

<div class="page">

<div class="pg-hero reveal">
<div class="pg-title">SSH<span>_HANDSHAKE</span></div>
<div class="pg-sub">PORT 22 OPEN · INTERNSHIP INQUIRIES WELCOME</div>
</div>

<div class="contact-wrap">

<div>

<form id="cf" action="https://formspree.io/f/xreybnby" method="POST">

<div class="ssh-field">
<label class="ssh-lbl">NAME</label>
<input class="ssh-in" type="text" name="name" placeholder="your_name" required>
</div>

<div class="ssh-field">
<label class="ssh-lbl">EMAIL</label>
<input class="ssh-in" type="email" name="email" placeholder="you@email.com" required>
</div>

<div class="ssh-field">
<label class="ssh-lbl">SUBJECT</label>
<input class="ssh-in" type="text" name="subject" placeholder="internship / collaboration">
</div>

<div class="ssh-field">
<label class="ssh-lbl">MESSAGE</label>
<textarea class="ssh-in" rows="6" name="message" placeholder="Write your message..." required></textarea>
</div>

<button type="submit" class="ssh-btn">[ TRANSMIT_MESSAGE ]</button>

<div id="form-status" class="ssh-status"></div>

</form>

</div>

</div>

</div>

<script src="cyber.js"></script>

<script>

const form = document.getElementById("cf");
const status = document.getElementById("form-status");

form.addEventListener("submit", async function(e){

e.preventDefault();

const data = new FormData(form);

try{

const response = await fetch(form.action,{
method:"POST",
body:data,
headers:{'Accept':'application/json'}
});

if(response.ok){

status.innerHTML="✓ MESSAGE TRANSMITTED — CONNECTION SECURE";
status.className="ssh-status success show";
form.reset();

}else{

status.innerHTML="✖ TRANSMISSION FAILED";
status.className="ssh-status error show";

}

}catch(err){

status.innerHTML="✖ NETWORK ERROR";
status.className="ssh-status error show";

}

});

</script>

</body>
</html>
